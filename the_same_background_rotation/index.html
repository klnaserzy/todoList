<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width initial-scale=1.0" />
        <title>todo list</title>
        <link rel="stylesheet" href="./styles.css" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    </head>
    <body>
        <div id="background-provided">
            <a href="https://www.pexels.com" target="_blank" title="go to pexels website">
              <img src="https://images.pexels.com/lib/api/pexels-white.png" />
            </a>
            <span id="photographer">
                <a href="https://www.pexels.com/@marcel-loffler-366529953/" target="_blank" title="find photographer">photographer: Marcel Löffler</a>
            </span>
            <a style="margin-left: 10px;" href="./background.html"><i class="fa fa-solid fa-image fa-lg" title="watch background images"></i></a>
        </div>
        <div id="left-fixed-container">
            <div id="fillInTodo">
                <form>
                    <p class="instruction">Title: </p>
                    <input id="todoTitle" type="text" placeholder="something title" autocomplete="off" required/>
                    <p class="instruction">Describe: </p>
                    <textarea id="describe" placeholder="describe..." rows="5"></textarea>
                    <p class="instruction">Date (dead line): </p>
                    <div class="wrapper">
                        <input id="deadLine" type="date" />
                        <input id="addTodoBtn" value="add todo" type="button">
                    </div>
                </form>
            </div>
            <div id="leastEvents">
                least time event:
                <div id="events">
                </div>
            </div>
        </div>
        <div class="draw-menu"><h1>draw-menu <i class="fa fa-solid fa-caret-left"></i></h1></div>
        <div id="timeContainer">
            <div id="yearMon"></div>
            <div id="nowDate">00:00:00</div>
        </div>
        <div id="todoList">
            <p class="instruction">Your list:</p>
            <div id="list">
                <table>
                    <thead>
                        <tr>
                            <td width="100px">title</td>
                            <td width="130px">date</td>
                            <td width="43%">describe</td>
                            <td width="120px">state</td>
                            <td width="90px">delete</td>
                        </tr>
                    </thead>
                    <tbody id="todoTask">
                    </tbody>
                </table>
            </div>
        </div>
        
        <script src="./body_background_img.js" type="module"></script>
        <script src="./todo.js" type="module"></script>
    </body>
</html>
